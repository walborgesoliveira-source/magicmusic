services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic_music_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
    ports:
      - "127.0.0.1:${APP_PORT:-8095}:${PORT:-3000}"
    volumes:
      - ./db.json:/app/db.json
    networks:
      - magic_music_net
      - proxy_net

networks:
  magic_music_net:
    name: magic_music_net
    driver: bridge
  proxy_net:
    external: true
    name: proxy_net
