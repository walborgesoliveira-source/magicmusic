services:
  db:
    image: postgres:16-alpine
    container_name: magic_music_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MAGIC_MUSIC_DB_NAME}
      POSTGRES_USER: ${MAGIC_MUSIC_DB_USER}
      POSTGRES_PASSWORD: ${MAGIC_MUSIC_DB_PASSWORD}
    volumes:
      - magic_music_pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - magic_music_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic_music_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
    ports:
      - "127.0.0.1:${APP_PORT:-8095}:${PORT:-3000}"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      - db
    networks:
      - magic_music_net
      - proxy_net

volumes:
  magic_music_pgdata:
    name: magic_music_pgdata

networks:
  magic_music_net:
    name: magic_music_net
    driver: bridge
  proxy_net:
    external: true
    name: proxy_net
